<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>ContextAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.min.css">

</head>

<body>

    <div class="app">

            <aside class="sidebar">

            <div class="sidebar-header">

                <h2>📚 My RAG</h2>

                <button
                    id="newChatBtn"
                    class="new-chat-btn"
                >
                    + New Chat
                </button>

            </div>

            <div
                id="history"
                class="history"
            >

            </div>

        </aside>
        <main class="chat">

            <div id="messages" class="messages">

        <div id="welcomeScreen" class="welcome">

            <div class="logo">
                📚
            </div>

            <h1>Welcome to ContextAI</h1>

            <p>
                Chat with your own PDF documents using AI.
                Upload one or more PDFs, ask questions in natural language,
                and receive answers with references to the original pages.
            </p>

            <div class="features">

                <div class="feature">
                    📄 Upload multiple PDFs
                </div>

                <div class="feature">
                    🔍 AI-powered document search
                </div>

                <div class="feature">
                    📚 Source citations
                </div>

                <div class="feature">
                    ⚡ Fast semantic retrieval
                </div>

            </div>

        </div>

    </div>

    <div class="composer">

        <!-- Selected files -->
        <div id="selectedFiles" class="selected-files"></div>

        <div class="composer-row">

            <!-- Upload Button -->
            <label class="attach-btn">

                <input
                type="file"
                id="pdfs"
                multiple
                hidden
                accept=".pdf">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M21.44 11.05L12 20.5a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 115.66 5.66L8.46 18.38a2 2 0 11-2.83-2.83l8.49-8.49"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>

                </label>

            <!-- Question -->
            <textarea
                id="question"
                rows="1"
                placeholder="Ask a question..."
            ></textarea>

            <!-- Send -->
            <button
                id="sendBtn"
                onclick="sendMessage()"
                title="Send"
            >
                ➤
            </button>

        </div>

    </div>
    </main>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>

</body>

</html>
